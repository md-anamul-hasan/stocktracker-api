name = "stocktracker-api"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[triggers]
crons = ["*/5 * * * *"]

[[d1_databases]]
binding = "DB"
database_name = "stocktracker-db"
database_id = "local"

[vars]
JWT_SECRET = "stocktracker-jwt-secret-change-in-production"
CORS_ORIGIN = "*"
